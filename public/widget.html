<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Pueblo Duerme — Widget</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1c1917;
      color: #fff;
      font-family: sans-serif;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .header img { width: 40px; height: 40px; border-radius: 50%; }
    .header h1 { font-size: 0.9rem; font-weight: 700; line-height: 1.2; }
    .header p { font-size: 0.7rem; color: #ef4444; margin-top: 0.1rem; }
    .msg { font-size: 0.75rem; color: rgba(255,255,255,0.6); line-height: 1.5; }
    a {
      display: inline-block;
      background: #ef4444;
      color: #fff;
      text-decoration: none;
      border-radius: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
      font-weight: 700;
      margin-top: auto;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="/icons/192.png" alt="logo" />
    <div>
      <h1>El Pueblo Duerme</h1>
      <p>El pueblo duerme...</p>
    </div>
  </div>
  <p class="msg">¿Serás capaz de descubrir al lobo antes de que sea demasiado tarde?</p>
  <a href="/?source=widget">Jugar Ahora</a>
</body>
</html>
